# =============================================================================
# cameras.conf — CCTV Simulator Configuration
# =============================================================================

# Number of cameras to simulate
CAMERA_COUNT=10

# Path to MP4 file (leave blank to auto-generate a test pattern)
VIDEO_FILE="/opt/cctv-simulator/videos/camera.mp4"

# RTSP port (NVRs connect here)
RTSP_PORT=8554

# MediaMTX REST API port
API_PORT=9997
