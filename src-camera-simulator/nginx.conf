# =============================================================================
# nginx.conf — CCTV Simulator Reverse Proxy
# Routes all traffic to the Flask app; authentication is handled by Flask.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Don't expose the Nginx version in error pages / headers
    server_tokens off;

    # Upstream: Flask app running in the "web" container on port 5000
    upstream flask_app {
        server web:5000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # ── Proxy to Flask (auth is handled inside Flask) ────────────────
        location / {
            # Proxy to Flask
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;

            # Pass useful headers through to Flask
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep connections alive for SSE / streaming responses
            proxy_set_header   Connection        "";
            proxy_buffering    off;

            # Generous timeouts for long-running simulator commands
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
