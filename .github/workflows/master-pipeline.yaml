name: "Enterprise DevSecOps & Deployment Pipeline"

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # STAGE 1: THE SECURITY GATE
  # ==========================================
  security-scan:
    name: "Container Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: 🐳 Build Simulator Image (Local CI Cache)
        run: docker build -t cctv-simulator:ci-test ./src-camera-simulator

      - name: 🛡️ Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cctv-simulator:ci-test'
          format: 'table'
          # CRITICAL: exit-code '1' fails the pipeline if a threat is found
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # STAGE 2: THE CLOUD DEPLOYMENT
  # ==========================================
  terraform-deploy:
    name: "Provision AWS Infrastructure"
    runs-on: ubuntu-latest
    needs: security-scan # <--- The Magic Link: This job waits for Stage 1 to pass
    
    defaults:
      run:
        working-directory: ./env-aws-cloud

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: ☁️ Setup Terraform Engine
        uses: hashicorp/setup-terraform@v4

      - name: 🔐 Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: 🏗️ Terraform Init (Connect to S3 Vault)
        run: terraform init

      - name: 🔍 Terraform Plan (Review Changes)
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply (Deploy to Cloud)
        run: terraform apply -auto-approve tfplan