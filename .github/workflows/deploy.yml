name: "Terraform Production Deployment"

# 1. THE TRIGGER: When does this robot run?
on:
  push:
    branches:
      - main # Runs automatically when you push to the main branch

# 2. THE ENVIRONMENT: Where does the robot live?
jobs:
  terraform-deploy:
    name: "Provision Infrastructure"
    runs-on: ubuntu-latest
    
    # Tell the robot to only run commands inside your terraform folder
    defaults:
      run:
        working-directory: ./env-aws-cloud

    # 3. THE SCRIPT: What exactly does the robot do?
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☁️ Setup Terraform Engine
        uses: hashicorp/setup-terraform@v3

      - name: 🔐 Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: 🏗️ Terraform Init (Connect to S3 Vault)
        run: terraform init

      - name: 🔍 Terraform Plan (Review Changes)
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply (Deploy to Cloud)
        run: terraform apply -auto-approve tfplan